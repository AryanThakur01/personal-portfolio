name: Deploy Portfolio

on:
  push:
    branches: [prod]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-portfolio
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  S3_BUCKET: portfolio-aryan-prod-980989823308-ap-south-1
  ROLE_ARN: arn:aws:iam::980989823308:role/github-deploy-portfolio 
  VITE_GIT_SHA: ${{ github.sha }}
  VITE_DEPLOY_ENV: prod
  VITE_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
  VITE_BUILD_BRANCH: ${{ github.ref_name }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10         # match your local pnpm major version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build        # outputs to web/dist

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync assets to S3 (cached)
        working-directory: web
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

      - name: Upload index.html (no-cache)
        working-directory: web
        run: |
          aws s3 cp dist/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache"
